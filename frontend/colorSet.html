<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div>
    <canvas id="color-wheel" width="300" height="300"></canvas>
</div>
<script>
    const canvas = document.getElementById('color-wheel');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const radius = width / 2;

    // 绘制彩虹色环
    for(let angle = 0; angle < 360; angle += 1) {
        const gradient = ctx.createRadialGradient(radius, radius, 0, radius, radius, radius);
        gradient.addColorStop(0, `hsl(${angle}, 100%, 50%)`);
        gradient.addColorStop(1, `hsl(${angle + 1}, 100%, 50%)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, (angle - 1) * Math.PI/180, angle * Math.PI/180);
        ctx.closePath();
        ctx.fill();
    }

    // 绑定鼠标事件，获取选中点的颜色值
    canvas.addEventListener('onclick', function(e){
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const imageData = ctx.getImageData(x, y, 1, 1);
        const r=imageData.data[0];
        const g=imageData.data[1];
        const b=imageData.data[2];
        // 在这里对选中的颜色进行处理或者输出
        console.log(r);
        console.log(g);
        console.log(b);
    });
</script>
</body>
</html>
