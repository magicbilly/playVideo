Server:
  Port: 8080
  Video_path: "C:/Users/tianshuo/Videos/视频/视频"
  Poster_path: "default"
#  默认是在视频路径下的poster目录下，如果没有会自动创建，并且使用FFmpeg抽出一帧来作为封面
#  需要视频名和封面名同名才能使用
  enableVideo2Ts: false
  TsVideoPath: "default"
# 是否需要该程序程序去进行将切分为.ts如果已经全部切分可以设为false，否则最好是true
# 默认路径是在Video_path下新建一个m3u8文件，将切分好的文件放在里面，支持指定目录
Database:
  User: "root"
  Passwd: "123456@Abc"
  Addr: "localhost:3306"
  DBName: "video"
  AllowNativePasswords: true
# MySQL8.0之后的版本不设定为true可能会报错，只能运行旧的认证方式
System:
  Coroutine: 0
# 这个是FFmpeg的最大的并发数量，0代表是用当前机器CPU总核数的一半


