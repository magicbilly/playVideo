Server:
  Port: 8080
  Video_path: "C:/Users/Videos/视频/视频"
  Poster_path: default
#  默认是在视频路径下的poster目录下，如果没有会自动创建，并且使用FFmpeg抽出一帧来作为封面
#  需要视频名和封面名同名才能使用
Database:
  User: "root"
  Passwd: "123456@Abc"
  Addr: "localhost:3306"
  DBName: "video"
  AllowNativePasswords: true
System:
  Coroutine: 0
# 这个是FFmpeg的最大的协程数量，0代表是用当前机器CPU总核数的一半